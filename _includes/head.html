<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

{%- assign page_title = page.title | default: site.title -%}
{%- assign page_description = page.description | default: site.description -%}

<title>{{ page_title }}</title>
<meta name="description" content="{{ page_description }}">
<link rel="canonical" href="{{ page.url | replace: 'index.html', '' | absolute_url }}">

<meta property="og:title" content="{{ page_title }}">
<meta property="og:description" content="{{ page_description }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:image" content="{{ '/images/social-share-image.jpg' | absolute_url }}">
<meta name="theme-color" content="#0F7BB5">

<link rel="icon" href="{{ '/images/1-21.png' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Open+Sans:wght@400;600;700&display=swap">
{% feed_meta %}

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "LocalBusiness",
  "name": "{{ site.business_name }}",
  "image": "{{ '/images/social-share-image.jpg' | absolute_url }}",
  "telephone": "+61{{ site.phone_link | slice: 1, 9 }}",
  "email": "{{ site.email }}",
  "url": "{{ site.url }}",
  "address": {
    "@type": "PostalAddress",
    "addressLocality": "Southport",
    "addressRegion": "QLD",
    "addressCountry": "AU"
  },
  "areaServed": "Gold Coast, QLD",
  {% if site.abn %}"taxID": "{{ site.abn }}",{% endif %}
  "sameAs": ["{{ site.facebook_url }}"],
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "5.0",
    "reviewCount": "25"
  }
}
</script>

{% if page.faqs %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {% for item in page.faqs %}
    {
      "@type": "Question",
      "name": {{ item.q | jsonify }},
      "acceptedAnswer": {
        "@type": "Answer",
        "text": {{ item.a | jsonify }}
      }
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ]
}
</script>
{% endif %}
